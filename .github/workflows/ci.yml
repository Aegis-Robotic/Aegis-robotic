name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22          # Mise à jour pour éviter l’avertissement
          cache: 'npm'

      - run: npm install           # ← Changé de "npm ci" vers "npm install"
      - run: npm run lint
      - run: npm run build
      - run: npm test
